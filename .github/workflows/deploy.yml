name: Deploy to Vercel (production)

# Reliable push-to-deploy that does NOT depend on the Vercel GitHub App webhook
# (which has been intermittently missing pushes). Uploads the source and builds
# in Vercel's cloud (the same path the dashboard/CLI deploys use), on every push
# to main.
#
# One-time setup: add a repo secret `VERCEL_TOKEN`
#   1. Vercel → Account Settings → Tokens → create a token (scope: the team).
#   2. GitHub → this repo → Settings → Secrets and variables → Actions →
#      New repository secret → name VERCEL_TOKEN, value = the token.
# Until the secret is set, this workflow no-ops cleanly (no failed runs).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_mIVbqOg8gPUJm0ymN7LmyJKb
  VERCEL_PROJECT_ID: prj_uFVwrD1XoBuNryo2zLVffYi5Wuz6
  # The Vercel CLI reads VERCEL_TOKEN from the environment automatically.
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check for VERCEL_TOKEN
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice::VERCEL_TOKEN not set — skipping deploy. Add it in repo Settings → Secrets → Actions."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.guard.outputs.run == 'true'
        run: npm i -g vercel@latest

      # Upload source and build in Vercel's cloud (handles the pnpm/sharp
      # build-scripts approval that the GitHub runner's pnpm rejects).
      - name: Deploy to production
        if: steps.guard.outputs.run == 'true'
        run: vercel deploy --prod --yes
